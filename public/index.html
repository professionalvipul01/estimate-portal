<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Wise | Construction Estimate Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; }
        body { background: #f0f2f5; font-family: 'Segoe UI', Roboto; }
        .card-shadow { border-radius: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .auth-card { max-width: 450px; margin: 3rem auto; }
        .estimate-card, .abstract-card { max-width: 1300px; margin: 2rem auto; }
        .btn-primary { background: var(--primary); border: none; }
        .btn-success { background: var(--secondary); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
<div class="container mt-4" id="appRoot"></div>
<script>
    const API_BASE = '/api';
    let authToken = localStorage.getItem('authToken');
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    let adminToken = localStorage.getItem('adminToken');

    async function apiCall(endpoint, method, body = null, useAdmin = false) {
        const headers = { 'Content-Type': 'application/json' };
        if (useAdmin && adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
        else if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
        const res = await fetch(`${API_BASE}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : undefined });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Request failed');
        return data;
    }

    function logout() {
        localStorage.clear();
        authToken = null; adminToken = null; currentUser = null;
        renderLogin();
    }

    function renderLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div class="auth-card card card-shadow"><div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="fas fa-calculator"></i> Estimate Portal</h3>
                <form id="loginForm">
                    <div class="mb-3"><label>Mobile Number</label><input type="tel" id="mobile" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr><p class="text-center">New user? <a href="#" id="showRegisterBtn">Create Profile</a></p>
                <p class="text-center"><a href="#" id="showAdminBtn"><i class="fas fa-user-shield"></i> Admin Login</a></p>
            </div></div>
        `;
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            try {
                const res = await apiCall('/auth/login', 'POST', { mobile, password });
                authToken = res.token; currentUser = res.user;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                renderEstimateForm();
            } catch (err) { alert(err.message); }
        };
        document.getElementById('showRegisterBtn').onclick = (e) => { e.preventDefault(); renderRegister(); };
        document.getElementById('showAdminBtn').onclick = (e) => { e.preventDefault(); renderAdminLogin(); };
    }

    function renderRegister() {
        document.getElementById('appRoot').innerHTML = `
            <div class="auth-card card card-shadow"><div class="card-body p-4">
                <h3 class="text-center">Create Profile</h3>
                <form id="registerForm">
                    <div class="mb-3"><label>Full Name</label><input type="text" id="name" class="form-control" required></div>
                    <div class="mb-3"><label>Mobile Number</label><input type="tel" id="mobile" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" required></div>
                    <button type="submit" class="btn btn-success w-100">Register & Login</button>
                </form>
                <hr><a href="#" id="backToLogin">← Back to Login</a>
            </div></div>
        `;
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            try {
                const res = await apiCall('/auth/register', 'POST', { name, mobile, password });
                authToken = res.token; currentUser = res.user;
                localStorage.setItem('authToken', authToken);
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                renderEstimateForm();
            } catch (err) { alert(err.message); }
        };
        document.getElementById('backToLogin').onclick = (e) => { e.preventDefault(); renderLogin(); };
    }

    function renderAdminLogin() {
        document.getElementById('appRoot').innerHTML = `
            <div class="auth-card card card-shadow"><div class="card-body p-4">
                <h3><i class="fas fa-user-shield"></i> Admin Login</h3>
                <form id="adminForm">
                    <div class="mb-3"><label>Email</label><input type="email" id="adminEmail" class="form-control"></div>
                    <div class="mb-3"><label>Password</label><input type="password" id="adminPass" class="form-control"></div>
                    <button type="submit" class="btn btn-dark w-100">Login</button>
                </form>
                <hr><a href="#" id="backMainLogin">← User Login</a>
            </div></div>
        `;
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPass').value;
            try {
                const res = await apiCall('/admin/login', 'POST', { email, password });
                adminToken = res.token;
                localStorage.setItem('adminToken', adminToken);
                renderAdminDashboard();
            } catch (err) { alert('Invalid admin credentials'); }
        };
        document.getElementById('backMainLogin').onclick = (e) => { e.preventDefault(); renderLogin(); };
    }

    function renderEstimateForm() {
        document.getElementById('appRoot').innerHTML = `
            <div class="estimate-card card card-shadow">
                <div class="card-header bg-white d-flex justify-content-between">
                    <h3><i class="fas fa-home"></i> Project Details</h3>
                    <span>Welcome ${currentUser?.name} | <a href="#" id="logoutLink">Logout</a></span>
                </div>
                <div class="card-body">
                    <form id="estimateForm" class="row g-3">
                        <div class="col-md-6"><label>Client Name</label><input type="text" id="clientName" class="form-control" required value="Yogesh Vishwkarma"></div>
                        <div class="col-md-6"><label>Address</label><input type="text" id="address" class="form-control" required value="101, XYZ appartment, Mumbai"></div>
                        <div class="col-md-4"><label>Landmark</label><input type="text" id="landmark" class="form-control" value="Ganesh mandir"></div>
                        <div class="col-md-4"><label>Plot Size (sqft)</label><input type="text" id="plotSize" class="form-control" placeholder="Optional"></div>
                        <div class="col-md-4"><label>Length (ft)</label><input type="number" id="length" class="form-control" required value="50" step="0.1"></div>
                        <div class="col-md-4"><label>Width (ft)</label><input type="number" id="width" class="form-control" required value="15" step="0.1"></div>
                        <div class="col-md-4"><label>No. of Floors</label><select id="noFloor" class="form-select"><option value="1">Ground Floor</option><option value="2" selected>G+1</option><option value="3">G+2</option></select></div>
                        <div class="col-md-4"><label>Rate per Sq.Ft. (₹)</label><input type="number" id="rateSqft" class="form-control" required value="1400" step="10"></div>
                        <div class="col-12"><button type="submit" class="btn btn-primary px-5"><i class="fas fa-file-invoice"></i> Generate Estimate</button></div>
                    </form>
                </div>
            </div>
        `;
        document.getElementById('estimateForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('clientName').value,
                address: document.getElementById('address').value,
                landmark: document.getElementById('landmark').value,
                plotSize: document.getElementById('plotSize').value,
                length: parseFloat(document.getElementById('length').value),
                width: parseFloat(document.getElementById('width').value),
                noFloor: parseInt(document.getElementById('noFloor').value),
                rateSqft: parseFloat(document.getElementById('rateSqft').value)
            };
            try {
                const result = await apiCall('/estimate/generate', 'POST', payload);
                renderAbstractPage(result.abstractItems, result.summary, payload);
            } catch (err) { alert(err.message); }
        };
        document.getElementById('logoutLink').onclick = (e) => { e.preventDefault(); logout(); };
    }

    function renderAbstractPage(items, summary, input) {
        const totalFormatted = `₹ ${summary.totalAmount.toLocaleString('en-IN')}`;
        document.getElementById('appRoot').innerHTML = `
            <div class="abstract-card card card-shadow">
                <div class="card-header bg-white d-flex flex-wrap justify-content-between">
                    <h3><i class="fas fa-file-pdf"></i> Final Abstract</h3>
                    <div class="no-print">
                        <button id="downloadPdfBtn" class="btn btn-danger me-2"><i class="fas fa-download"></i> PDF</button>
                        <button id="shareWhatsAppBtn" class="btn btn-success me-2"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        <button id="shareEmailBtn" class="btn btn-info me-2"><i class="fas fa-envelope"></i> Email</button>
                        <button id="newEstimateBtn" class="btn btn-secondary">New Estimate</button>
                    </div>
                </div>
                <div class="card-body" id="abstractContent">
                    <div style="padding:20px">
                        <div class="text-center mb-3">
                            <h3>RATE WISE CONSTRUCTION</h3>
                            <p>Urban Admin & Development Dept. Rates w.e.f 10/05/2012</p>
                            <p><strong>Client:</strong> ${input.name} | <strong>Address:</strong> ${input.address}<br>
                            <strong>Plot:</strong> ${input.length}' x ${input.width}' | <strong>Floors:</strong> ${input.noFloor} | <strong>Rate:</strong> ₹${summary.ratePerSqft}/sqft<br>
                            <strong>Built-up Area:</strong> ${summary.builtUpArea} sq.ft | <strong>Total:</strong> ${totalFormatted}</p>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered">
                                <thead class="table-light"><tr><th>#</th><th>Item</th><th>Unit</th><th>Qty</th><th>Rate (₹)</th><th>Amount (₹)</th></tr></thead>
                                <tbody id="abstractItemsBody"></tbody>
                                <tfoot><tr class="table-secondary"><td colspan="5" class="text-end fw-bold">Subtotal</td><td>${summary.subtotal.toLocaleString('en-IN')}</td></tr>
                                <tr class="table-secondary"><td colspan="5" class="text-end fw-bold">Extras @15%</td><td>${summary.extraAmount.toLocaleString('en-IN')}</td></tr>
                                <tr class="table-dark"><td colspan="5" class="text-end fw-bold">GRAND TOTAL</td><td>${totalFormatted}</td></tr></tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const tbody = document.getElementById('abstractItemsBody');
        items.forEach((it, idx) => {
            tbody.innerHTML += `<tr><td>${idx+1}</td><td>${it.description}</td><td>${it.unit}</td><td>${it.quantity.toFixed(2)}</td><td>${it.rate.toLocaleString('en-IN')}</td><td>${it.amount.toLocaleString('en-IN')}</td></tr>`;
        });
        document.getElementById('downloadPdfBtn').onclick = () => html2pdf().set({ margin: 0.5, filename: `Estimate_${input.name}.pdf` }).from(document.getElementById('abstractContent')).save();
        document.getElementById('shareWhatsAppBtn').onclick = () => window.open(`https://wa.me/?text=${encodeURIComponent(`Estimate for ${input.name}: ₹${summary.totalAmount.toLocaleString('en-IN')} (Built-up: ${summary.builtUpArea} sqft)`)}`,'_blank');
        document.getElementById('shareEmailBtn').onclick = () => window.location.href = `mailto:?subject=Construction Estimate&body=Dear ${input.name}, total estimate amount is ${totalFormatted}.`;
        document.getElementById('newEstimateBtn').onclick = () => renderEstimateForm();
    }

    async function renderAdminDashboard() {
        try {
            const data = await apiCall('/admin/estimates', 'GET', null, true);
            const estimates = data.estimates || [];
            document.getElementById('appRoot').innerHTML = `
                <div class="card card-shadow p-4">
                    <div class="d-flex justify-content-between mb-3"><h2>Admin Dashboard</h2><button id="adminLogoutBtn" class="btn btn-outline-danger">Logout</button></div>
                    <div class="table-responsive"><table class="table table-bordered"><thead><tr><th>User</th><th>Client</th><th>Built-up</th><th>Total (₹)</th><th>Rate/sqft</th><th>Date</th></tr></thead><tbody id="adminTableBody"></tbody></table></div>
                </div>
            `;
            const tbody = document.getElementById('adminTableBody');
            estimates.forEach(est => {
                tbody.innerHTML += `<tr><td>${est.userName || '?'}</td><td>${est.clientName}</td><td>${est.builtUpArea}</td><td>${est.totalAmount.toLocaleString('en-IN')}</td><td>${est.rateSqft}</td><td>${new Date(est.createdAt).toLocaleString()}</td></tr>`;
            });
            document.getElementById('adminLogoutBtn').onclick = () => { localStorage.clear(); adminToken=null; renderLogin(); };
        } catch(err) { alert('Admin error'); renderLogin(); }
    }

    // initial routing
    if (adminToken) renderAdminDashboard();
    else if (authToken && currentUser) renderEstimateForm();
    else renderLogin();
</script>
</body>
</html>
